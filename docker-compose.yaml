version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=retail_db
    # Kluczowe dla Debezium (Zadanie 2): wal_level musi być logical [cite: 103]
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-network

networks:
  data-network:
    driver: bridge

volumes:
  postgres_data: